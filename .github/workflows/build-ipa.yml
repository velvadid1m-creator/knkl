name: Build IPA

# Builds an UNSIGNED PingMe.ipa on GitHub's free macOS runners.
# You then download it and let Sideloadly (Windows) sign + install it.
#
# How to run it:
#  1. Make a free GitHub account, create a new repo, upload everything in this
#     folder (keep the structure) to it.
#  2. GitHub will pick this file up automatically. Go to the repo's "Actions"
#     tab -> "Build IPA" -> "Run workflow".
#  3. When it finishes (~2-3 min), open the run and download the "PingMe-ipa"
#     artifact at the bottom. Unzip it to get PingMe.ipa.
#  4. Feed PingMe.ipa to Sideloadly on Windows as usual.

on:
  workflow_dispatch:        # lets you press "Run workflow" by hand
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (no signing)
        run: |
          set -e
          xcodebuild \
            -project PingMe.xcodeproj \
            -target PingMe \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package into .ipa
        run: |
          set -e
          APP_PATH="build/Build/Products/Release-iphoneos/PingMe.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Build output not found at $APP_PATH"; ls -R build/Build/Products || true; exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r PingMe.ipa Payload >/dev/null
          echo "Made PingMe.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PingMe-ipa
          path: PingMe.ipa
          if-no-files-found: error
