name: Build IPA

# Builds an UNSIGNED Shopify.ipa on GitHub's free macOS runners.
# You then download it and let Sideloadly (Windows) sign + install it.
#
# How to run it:
#  1. Make a free GitHub account, create a new repo, upload everything in this
#     folder (keep the structure) to it.
#  2. GitHub will pick this file up automatically. Go to the repo's "Actions"
#     tab -> "Build IPA" -> "Run workflow".
#  3. When it finishes (~2-3 min), open the run and download the "Shopify-ipa"
#     artifact at the bottom. Unzip it to get Shopify.ipa.
#  4. Feed Shopify.ipa to Sideloadly on Windows as usual.

on:
  workflow_dispatch:        # lets you press "Run workflow" by hand
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (no signing)
        run: |
          set -e
          xcodebuild \
            -project Shopify.xcodeproj \
            -target Shopify \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package into .ipa
        run: |
          set -e
          APP_PATH="build/Release-iphoneos/Shopify.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Build output not found at $APP_PATH"; ls -R build || true; exit 1
          fi
          rm -rf Payload Shopify.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          # Ad-hoc sign so Sideloadly can re-sign the IPA (unsigned builds often fail with "Invalid file")
          codesign --force --sign - --deep "Payload/Shopify.app"
          ditto -c -k --sequesterRsrc --keepParent Payload Shopify.ipa
          ls -lh Shopify.ipa
          /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "Payload/Shopify.app/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "Payload/Shopify.app/Info.plist" || true
          echo "Made Shopify.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Shopify-ipa
          path: Shopify.ipa
          if-no-files-found: error
